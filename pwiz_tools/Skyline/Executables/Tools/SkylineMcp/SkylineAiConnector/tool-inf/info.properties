Name = AI Connector
Version = ${version}
Author = Brendan MacLean
Description = The AI Connector enables AI client applications to interact with a running Skyline instance through the Model Context Protocol (MCP). Supported AI clients include Claude Desktop, Claude Code, Gemini CLI, VS Code (Copilot), and Cursor. Once installed, click Tools > AI Connector to launch the connector form, which detects installed AI clients and registers Skyline with them in a single click. An option to connect automatically at startup is also available, allowing your AI clients to find Skyline without manually opening the connector each time.\
\
With the AI Connector, you can use natural language to add targets from FASTA files and transition lists, query document data about proteins, peptides, precursors, and transitions, run and create custom reports with filtering, sorting, and pivoting, navigate the document tree, view chromatograms and other Skyline graphs, execute any command-line operation with full undo support, access documentation for reports, command-line, and tutorials, and manage settings such as modifications and enzymes.\
\
Requires Skyline-daily 26.1.1 or later and the .NET 8.0 Desktop Runtime.
Organization = MacCoss Lab, UW
