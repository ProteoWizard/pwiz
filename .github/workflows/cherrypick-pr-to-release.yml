name: Cherry pick PR to release

on:
  pull_request:
    branches: [ master ]
    types: [ closed ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to backport'
        required: true
        type: number

jobs:
  release_pull_request:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Cherry pick to release'))
    runs-on: ubuntu-latest
    name: release_pull_request
    steps:
    - name: checkout
      uses: actions/checkout@v1
    - name: Prepare event data
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (context.eventName === 'workflow_dispatch') {
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number || 0 }}
            });
            fs.writeFileSync(process.env.GITHUB_WORKSPACE + '/_pr_event.json', JSON.stringify({ pull_request: pr.data }));
          } else {
            fs.copyFileSync(process.env.GITHUB_EVENT_PATH, process.env.GITHUB_WORKSPACE + '/_pr_event.json');
          }
    - name: Cherry pick PR to release
      uses: chambm/gh-backport-action@v3
      env:
        GITHUB_EVENT_PATH: /github/workspace/_pr_event.json
      with:
        pr_branch: 'Skyline/skyline_26_1'
        pr_title: 'Cherry pick of #{pr_number} ({original_title}) from {base_branch} to {pr_branch}'
        github_token: ${{ secrets.GITHUB_TOKEN }}
